# Server
server.port=8080

# H2 In-Memory Database
spring.datasource.url=jdbc:h2:mem:tododb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=sa

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# H2 console enabled locally for debugging. Disable in production.
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
# Required: H2 console uses iframes which Spring Security blocks by default
spring.h2.console.settings.web-allow-others=false

# Scheduler
# Interval between past-due sweeps in milliseconds. Configurable per environment.
todo.scheduler.past-due-sweep-delay-ms=60000

# Logging
logging.level.root=INFO
logging.level.com.todo=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=WARN
logging.level.org.springframework.scheduling=INFO

# Use logback-spring.xml for structured JSON logging (see resources/logback-spring.xml)
